[tools]
hk = "1.43.0"
pkl = "0.31.1"
actionlint = "1.7.12"
yamllint = "1.38.0"
markdownlint-cli2 = "0.22.1"
gitleaks = "8.30.1"
editorconfig-checker = "3.6.1"
"pipx:codespell" = "2.4.2"

[tasks.lint]
alias = "l"
description = "Lint the codebase"
run = "hk check --all"

[tasks.format]
alias = "fmt"
description = "Format the codebase"
run = "hk fix --all"

[tasks.postlint]
description = "Run post-lint checks"
run = "git diff --exit-code"
